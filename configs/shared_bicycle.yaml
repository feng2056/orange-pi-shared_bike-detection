# shared_bicycle.yaml
path: D:\桌面\cycledata\dataset # 数据集根目录
train: images/train  # 训练图像相对路径
val: images/val    # 验证图像相对路径
test: images/val   # 测试图像相对路径（可选）

# 类别数（单类别：共享单车）
nc: 1

# 类别名称（必须与标注中的class_id对应）
names:
  0: shared_bicycle

# 可选：如果有多类别
# names: ['shared_bicycle', 'bicycle_rack', 'person']  # 对应 class_id 0, 1, 2